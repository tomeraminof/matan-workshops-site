name: Sync reference images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "assets/images/reference/**"

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Wix reference images
        run: python scripts/download_reference_images.py

      - name: Commit downloaded assets
        run: |
          if git diff --quiet -- assets/images/reference && \
             [ -z "$(git status --short --untracked-files=all assets/images/reference | grep -v 'manifest.json' || true)" ]; then
            echo "Reference images are already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images/reference
          git commit -m "Add local Matan reference images"
          git push
